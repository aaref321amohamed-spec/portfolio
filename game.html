<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:10px;
}

.card{
  width:80px;
  height:80px;
  background:#1e293b;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
  border-radius:10px;
}

.flipped{
  background:#38bdf8;
  color:black;
}
</style>
</head>

<body>

<div class="game" id="game"></div>

<script>
const emojis = ["🍎","🍎","🚗","🚗","🐶","🐶","⚽","⚽","🍕","🍕","🎧","🎧","🔥","🔥","🎮","🎮"];

let first = null;
let second = null;

const game = document.getElementById("game");

emojis.sort(()=>0.5 - Math.random());

emojis.forEach(e=>{
  const div = document.createElement("div");
  div.classList.add("card");
  div.innerHTML = "?";

  div.onclick = ()=>{
    if(div.classList.contains("flipped")) return;

    div.innerHTML = e;
    div.classList.add("flipped");

    if(!first){
      first = div;
    }else{
      second = div;

      if(first.innerHTML === second.innerHTML){
        first = null;
        second = null;
      }else{
        setTimeout(()=>{
          first.innerHTML = "?";
          second.innerHTML = "?";
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          first = null;
          second = null;
        },700);
      }
    }
  };

  game.appendChild(div);
});
</script>

</body>
</html>
