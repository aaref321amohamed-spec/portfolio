<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmed Aref Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    img {
      width: 150px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
    }

    h1 {
      margin: 15px 0 5px;
      font-size: 32px;
    }

    p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
    }

    footer {
      padding: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <img src="me.jpg" alt="My Photo">
    <h1>Ahmed Aref</h1>
    <p>Software Engineering Student</p>
    <a href="#" class="btn">Contact Me</a>
  </header>

  <section>
    <h2>💻 Skills</h2>
    <div class="cards">
      <div class="card">HTML</div>
      <div class="card">CSS</div>
      <div class="card">JavaScript</div>
    </div>
  </section>

  <section>
    <h2>📂 Projects</h2>
    <div class="cards">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
    </div>
  </section>

  <footer>
    © 2026 Ahmed Aref
  </footer>

</body>
</html>
