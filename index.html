<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahmed Aref Mohamed | Portfolio</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2b;
      --border:#22304f;
      --text:#e8eefc;
      --muted:#b8c5e6;
      --accent:#7aa2ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, #162444 0%, var(--bg) 45%) no-repeat, var(--bg);
      color:var(--text);
    }
    .wrap{max-width:900px; margin:0 auto; padding:56px 20px}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 60%), var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .top{display:flex; gap:18px; align-items:center; flex-wrap:wrap}
    .avatar{
      width:120px; height:120px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(122,162,255,0.45);
      background:#0f172a;
    }
    h1{margin:0; font-size:30px; letter-spacing:0.2px}
    .subtitle{color:var(--muted); margin-top:6px; font-size:16px}
    .about{margin-top:18px; line-height:1.8; color:var(--text)}
    .links{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap}
    a.btn{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      border:1px solid rgba(255,255,255,0.08);
    }
    a.primary{background:var(--accent); color:#0b1220}
    a.secondary{background:transparent; color:var(--text)}
    a.secondary:hover{border-color: rgba(122,162,255,0.55)}
    footer{margin-top:18px; color:var(--muted); font-size:13px}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <!-- Put your photo in the same folder and name it: me.jpg -->
        <img class="avatar" src="me.jpg" alt="Ahmed photo" />
        <div>
          <h1>Ahmed Aref Mohamed</h1>
          <div class="subtitle">Aqaba University of Technology — Software Engineering</div>
        </div>
      </div>

      <div class="about">
        <p>
          Hello! I’m Ahmed Aref Mohamed, a Software Engineering student at Aqaba University of Technology.
          I’m interested in building modern websites and improving my programming skills.
        </p>
      </div>

      <div class="links">
        <!-- Change links as you like -->
        <a class="btn primary" href="mailto:a.aref321.a.mohamed@gmail.com">Email</a>
        <a class="btn secondary" href="https://linkedin.com" target="_blank" rel="noreferrer">LinkedIn</a>
        <a class="btn secondary" href="https://github.com" target="_blank" rel="noreferrer">GitHub</a>
      </div>

      <footer>
        © <span id="y"></span> Ahmed Aref Mohamed
      </footer>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
